version: '3.8'

services:
  liferay:
    image: liferay/portal:7.4.3.112-ga112
    container_name: liferay_74
    ports:
      - "8080:8080"
    environment:
      - LIFERAY_JVM_OPTS=-Xms2g -Xmx4g
      - LIFERAY_DB_DRIVER=com.mysql.cj.jdbc.Driver
      - LIFERAY_DB_URL=jdbc:mysql://db:3306/lportal?useUnicode=true&characterEncoding=UTF-8&useFastDateParsing=false
      - LIFERAY_DB_USERNAME=liferay
      - LIFERAY_DB_PASSWORD=liferay
    volumes:
      - liferay_data:/opt/liferay/data
      - liferay_deploy:/opt/liferay/deploy
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    container_name: liferay_db
    ports:
      - "3333:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=password
      - MYSQL_DATABASE=lportal
      - MYSQL_USER=liferay
      - MYSQL_PASSWORD=liferay
      # Thêm dòng này để dùng auth plugin tương thích hơn
      - MYSQL_ROOT_HOST=%
    volumes:
      - mysql_data:/var/lib/mysql
      # Mount script init vào đây để MySQL tự chạy khi khởi động
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: liferay_phpmyadmin
    ports:
      - "8081:80"
    environment:
      - PMA_HOST=db
      - PMA_PORT=3306
    depends_on:
      - db

volumes:
  liferay_data:
  liferay_deploy:
  mysql_data: